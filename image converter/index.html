<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Image Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>Image Format Converter</h1>
        <p class="subtitle">Runs entirely in your browser. No files are uploaded to any server.</p>

        <div class="upload-area" id="dropZone">
            <span id="uploadText">📁 Drag & Drop or Click to Upload</span>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <img id="preview" alt="Image preview">

        <div class="details-box" id="detailsBox">
            <strong>Original Format: </strong> <span id="detectedFormat">-</span><br>
            <strong>File Size: </strong> <span id="fileSize">-</span>
        </div>

        <div class="controls-group" id="controlsGroup">
            <div class="control-row">
                <label>Convert to:</label>
                <select id="outputFormat">
                    <option value="image/png">PNG</option>
                    <option value="image/jpeg">JPEG</option>
                    <option value="image/webp">WebP</option>
                </select>
            </div>
            
            <div class="control-row">
                <label>Quality: <span id="qualityValue" style="font-weight: normal;">N/A (Lossless)</span></label>
                <input type="range" id="qualitySlider" min="0.1" max="1" step="0.1" value="0.9" disabled>
            </div>
        </div>

        <button id="convertBtn" disabled>
            <span class="spinner" id="spinner"></span>
            <span id="btnText">Download Converted Image</span>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>

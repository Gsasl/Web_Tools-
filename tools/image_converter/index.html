<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Image Converter & Pro Editor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cropper/cropper.css">
</head>
<body>

    <a href="../../" class="back-link">← Back to Tools Collection</a>

    <div class="card">
        <header class="app-header">
            <h1>Image Format Converter & Pro Editor</h1>
            <p class="subtitle">Convert, crop, filter, watermark, and batch-process. 100% secure client-side processing.</p>
        </header>

        <div class="upload-area" id="dropZone">
            <div id="uploadIcon" style="font-size: 2.5rem; margin-bottom: 10px;">📥</div>
            <span id="uploadText">Drag & Drop images here (Supports Batch Upload)</span>
            <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp, image/heic, image/heif, .heic, .heif" multiple>
        </div>

        <div id="workspace" class="workspace hidden">
            
            <div class="preview-column">
                <div class="preview-container">
                    <img id="preview" alt="Image preview">
                </div>
                
                <div id="cropControls" class="crop-controls hidden">
                    <button id="cancelCropBtn" class="secondary-btn">Cancel</button>
                    <button id="rotateBtn" class="secondary-btn">↻ Rotate 90°</button>
                    <button id="applyCropBtn">Apply Changes</button>
                </div>
            </div>

            <div class="controls-sidebar" id="mainControls">
                
                <div class="details-box" id="detailsBox">
                    <div class="detail-item"><strong>Format:</strong> <span id="detectedFormat">-</span></div>
                    <div class="detail-item"><strong>Files:</strong> <span id="fileCount">1</span></div>
                </div>

                <button id="cropBtn" class="tool-btn">◩ Crop & Rotate</button>

                <div class="effects-box">
                    <div class="effects-header"><strong>Pro Features</strong></div>
                    <div class="control-row" style="margin-bottom: 10px;">
                        <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox" id="stripExif" checked> 
                            🛡️ Strip Privacy Data (EXIF)
                        </label>
                    </div>
                    <button id="aiBgBtn" class="secondary-btn" style="width: 100%; font-size: 0.9rem;">✨ AI Background Removal</button>
                </div>

                <div class="effects-box">
                    <div class="effects-header">
                        <strong>Visual Effects</strong>
                        <button id="resetEffectsBtn" class="text-btn">Reset</button>
                    </div>
                    <div class="slider-group">
                        <label>Brightness: <span id="brightVal">100%</span></label>
                        <input type="range" id="brightSlider" min="0" max="200" value="100">
                    </div>
                    <div class="slider-group">
                        <label>Contrast: <span id="contrastVal">100%</span></label>
                        <input type="range" id="contrastSlider" min="0" max="200" value="100">
                    </div>
                    <div class="slider-group">
                        <label>Grayscale: <span id="grayVal">0%</span></label>
                        <input type="range" id="graySlider" min="0" max="100" value="0">
                    </div>
                    <div class="slider-group">
                        <label>Blur: <span id="blurVal">0px</span></label>
                        <input type="range" id="blurSlider" min="0" max="10" step="0.5" value="0">
                    </div>
                </div>

                <div class="effects-box">
                    <div class="effects-header"><strong>Text Watermark</strong></div>
                    <div class="control-row">
                        <input type="text" id="watermarkText" placeholder="Your text here..." style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #cbd5e1;">
                    </div>
                    <div class="control-row" style="margin-top: 10px; margin-bottom: 0;">
                        <label>Color:</label>
                        <input type="color" id="watermarkColor" value="#ffffff" style="cursor: pointer; border: none; background: none; width: 40px; height: 30px;">
                    </div>
                </div>

                <div class="controls-group">
                    <div class="control-row">
                        <label>Export as:</label>
                        <select id="outputFormat">
                            <option value="image/jpeg">JPEG</option>
                            <option value="image/png">PNG</option>
                            <option value="image/webp">WebP</option>
                        </select>
                    </div>
                    <div class="control-row">
                        <label>Quality: <span id="qualityValue" class="badge">90%</span></label>
                        <input type="range" id="qualitySlider" min="0.1" max="1" step="0.1" value="0.9">
                    </div>
                </div>

                <button id="convertBtn" class="download-btn">
                    <span class="spinner" id="spinner"></span>
                    <span id="btnText">Download Image(s)</span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="cropper/cropper.js"></script>
    <script src="script.js"></script>
</body>
</html>

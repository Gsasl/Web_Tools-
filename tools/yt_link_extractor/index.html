<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Playlist Extractor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a href="../../" class="back-link">← Back to Tools</a>

    <div class="card">
        <h1>NotebookLM Playlist Extractor</h1>
        <p class="subtitle">Extract clean links for NotebookLM sources instantly.</p>

        <div class="input-group">
            <input type="text" id="playlistUrl" placeholder="https://www.youtube.com/playlist?list=..." autocomplete="off"/>
            <button id="extractBtn" onclick="extractLinks()">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Extract</span>
            </button>
        </div>
        
        <div id="status" class="status-msg"></div>

        <div class="textarea-wrapper">
            <textarea id="output" placeholder="Video links will appear here..." readonly></textarea>
        </div>
        
        <button id="copyBtn" class="secondary-btn" onclick="copyLinks()" disabled>📋 Copy All Links</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
